services:
  postgres:
    image: postgres:16-alpine
    container_name: oltflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oltpanel}
      POSTGRES_USER: ${POSTGRES_USER:-oltpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oltpanel}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: oltflow-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: oltflow-web
    env_file: .env
    environment:
      PORT: "3000"
      NODE_ENV: "production"
    # Production build (frees ~2GB RAM vs `next dev` + serves instantly, no per-request
    # recompile). Rebuilds on start so a fresh .next volume is always valid. Cookie stays
    # non-secure over HTTP via COOKIE_SECURE (see lib/auth.ts). Flip back to `npm run dev`
    # for iterative web development.
    command: ["sh", "-c", "npm run build -w apps/web && npm run start -w apps/web"]
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: oltflow-worker
    env_file: .env
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  web_node_modules: {}
  web_next: {}
  worker_node_modules: {}
